<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBX Viewer – Full Portal</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #info {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      pointer-events: none;
    }

    #loading {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="loading">Lade FBX-Modell ...</div>
    <div id="info">
      Maus links: drehen<br>
      Maus rechts: verschieben<br>
      Mausrad: zoomen
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    const container = document.getElementById('app');
    const loadingEl = document.getElementById('loading');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x151515);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      5000
    );
    camera.position.set(0, 120, 260);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 80, 0);
    controls.update();

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.8);
    hemiLight.position.set(0, 200, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
    dirLight.position.set(200, 300, 200);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.8);
    fillLight.position.set(-150, 120, -100);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(1000, 40, 0x666666, 0x333333);
    grid.position.y = 0;
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1000, 1000),
      new THREE.ShadowMaterial({ opacity: 0.18 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const loader = new FBXLoader();
    let model = null;
    let boxHelper = null;

    const params = {
      posX: 0,
      posY: 0,
      posZ: 0,
      rotX: 0,
      rotY: 0,
      rotZ: 0,
      scale: 1,
      wireframe: false,
      showGrid: true,
      autoRotateY: false,
      reset: () => {
        params.posX = 0;
        params.posY = 0;
        params.posZ = 0;
        params.rotX = 0;
        params.rotY = 0;
        params.rotZ = 0;
        params.scale = 1;
        gui.controllersRecursive().forEach(c => c.updateDisplay());
        applyTransforms();
      }
    };

    const gui = new GUI();
    gui.title('Modellsteuerung');

    const positionFolder = gui.addFolder('Position');
    positionFolder.add(params, 'posX', -500, 500, 1).name('X').onChange(applyTransforms);
    positionFolder.add(params, 'posY', -500, 500, 1).name('Y').onChange(applyTransforms);
    positionFolder.add(params, 'posZ', -500, 500, 1).name('Z').onChange(applyTransforms);
    positionFolder.open();

    const rotationFolder = gui.addFolder('Rotation');
    rotationFolder.add(params, 'rotX', -180, 180, 1).name('X°').onChange(applyTransforms);
    rotationFolder.add(params, 'rotY', -180, 180, 1).name('Y°').onChange(applyTransforms);
    rotationFolder.add(params, 'rotZ', -180, 180, 1).name('Z°').onChange(applyTransforms);
    rotationFolder.open();

    const scaleFolder = gui.addFolder('Skalierung');
    scaleFolder.add(params, 'scale', 0.01, 10, 0.01).name('Uniform').onChange(applyTransforms);
    scaleFolder.open();

    const viewFolder = gui.addFolder('Ansicht');
    viewFolder.add(params, 'wireframe').name('Wireframe').onChange(setWireframe);
    viewFolder.add(params, 'showGrid').name('Grid').onChange(v => {
      grid.visible = v;
    });
    viewFolder.add(params, 'autoRotateY').name('Auto Rotate Y');
    viewFolder.open();

    gui.add(params, 'reset').name('Reset');

    loader.load(
      'models/fullportal_textured.fbx',
      (fbx) => {
        model = fbx;

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;

            if (Array.isArray(child.material)) {
              child.material.forEach((mat) => {
                if ('transparent' in mat) mat.transparent = true;
                if ('side' in mat) mat.side = THREE.DoubleSide;
              });
            } else if (child.material) {
              if ('transparent' in child.material) child.material.transparent = true;
              if ('side' in child.material) child.material.side = THREE.DoubleSide;
            }
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        model.position.sub(center);
        model.position.y += size.y * 0.5;

        scene.add(model);

        boxHelper = new THREE.BoxHelper(model, 0x00ffff);
        boxHelper.visible = false;
        scene.add(boxHelper);

        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim * 1.8 || 200;

        camera.position.set(distance * 0.6, distance * 0.5, distance);
        camera.near = Math.max(0.1, maxDim / 1000);
        camera.far = Math.max(5000, maxDim * 20);
        camera.updateProjectionMatrix();

        controls.target.set(0, size.y * 0.35, 0);
        controls.update();

        loadingEl.style.display = 'none';
      },
      (xhr) => {
        if (xhr.total) {
          const percent = (xhr.loaded / xhr.total) * 100;
          loadingEl.textContent = `Lade FBX-Modell ... ${percent.toFixed(0)}%`;
        }
      },
      (error) => {
        console.error(error);
        loadingEl.textContent = 'Fehler beim Laden des Modells. Prüfe Pfad und Texturen.';
      }
    );

    function applyTransforms() {
      if (!model) return;

      model.position.x = params.posX;
      model.position.y = params.posY;
      model.position.z = params.posZ;

      model.rotation.x = THREE.MathUtils.degToRad(params.rotX);
      model.rotation.y = THREE.MathUtils.degToRad(params.rotY);
      model.rotation.z = THREE.MathUtils.degToRad(params.rotZ);

      model.scale.setScalar(params.scale);

      if (boxHelper) boxHelper.update();
    }

    function setWireframe(enabled) {
      if (!model) return;

      model.traverse((child) => {
        if (!child.isMesh || !child.material) return;

        if (Array.isArray(child.material)) {
          child.material.forEach((mat) => {
            if ('wireframe' in mat) mat.wireframe = enabled;
          });
        } else {
          if ('wireframe' in child.material) child.material.wireframe = enabled;
        }
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      if (model && params.autoRotateY) {
        model.rotation.y += 0.01;
        params.rotY = THREE.MathUtils.radToDeg(model.rotation.y);
        if (params.rotY > 180) params.rotY -= 360;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
