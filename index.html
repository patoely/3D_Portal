<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBX Viewer – fullportal_textured</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101010;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #loading, #info, #toolbar {
      position: absolute;
      left: 16px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      max-width: 520px;
    }

    #loading {
      top: 16px;
    }

    #toolbar {
      top: 66px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #info {
      bottom: 16px;
      pointer-events: none;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      background: #2b7fff;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    button.secondary {
      background: #444;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="loading">Lade Modell ...</div>

    <div id="toolbar">
      <button id="playVideosBtn" disabled>Videos starten</button>
      <button id="restoreTexturesBtn" class="secondary" disabled>Zu Texturen zurück</button>
    </div>

    <div id="info">
      Linke Maustaste: drehen<br>
      Rechte Maustaste: verschieben<br>
      Mausrad: zoomen
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    const MODEL_DIR = 'models/';
    const MODEL_FILE = 'fullportal_textured.fbx';

    const container = document.getElementById('app');
    const loadingEl = document.getElementById('loading');
    const playVideosBtn = document.getElementById('playVideosBtn');
    const restoreTexturesBtn = document.getElementById('restoreTexturesBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      10000
    );
    camera.position.set(0, 120, 260);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 80, 0);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.6);
    hemiLight.position.set(0, 200, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
    dirLight.position.set(200, 250, 180);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.65);
    fillLight.position.set(-180, 140, -120);
    scene.add(fillLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambientLight);

    const grid = new THREE.GridHelper(1000, 40, 0x666666, 0x2c2c2c);
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1000, 1000),
      new THREE.ShadowMaterial({ opacity: 0.18 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    let model = null;
    let isUsingVideos = false;

    const originalMaps = new WeakMap();
    const activeVideoEntries = [];

    const params = {
      posX: 0,
      posY: 0,
      posZ: 0,
      rotX: 0,
      rotY: 0,
      rotZ: 0,
      scale: 1,
      wireframe: false,
      showGrid: true,
      autoRotateY: false,
      reset() {
        params.posX = 0;
        params.posY = 0;
        params.posZ = 0;
        params.rotX = 0;
        params.rotY = 0;
        params.rotZ = 0;
        params.scale = 1;
        gui.controllersRecursive().forEach(c => c.updateDisplay());
        applyTransforms();
      }
    };

    const gui = new GUI();
    gui.title('Modellsteuerung');

    const fPos = gui.addFolder('Position');
    fPos.add(params, 'posX', -500, 500, 1).name('X').onChange(applyTransforms);
    fPos.add(params, 'posY', -500, 500, 1).name('Y').onChange(applyTransforms);
    fPos.add(params, 'posZ', -500, 500, 1).name('Z').onChange(applyTransforms);
    fPos.open();

    const fRot = gui.addFolder('Rotation');
    fRot.add(params, 'rotX', -180, 180, 1).name('X°').onChange(applyTransforms);
    fRot.add(params, 'rotY', -180, 180, 1).name('Y°').onChange(applyTransforms);
    fRot.add(params, 'rotZ', -180, 180, 1).name('Z°').onChange(applyTransforms);
    fRot.open();

    const fScale = gui.addFolder('Skalierung');
    fScale.add(params, 'scale', 0.01, 10, 0.01).name('Uniform').onChange(applyTransforms);
    fScale.open();

    const fView = gui.addFolder('Ansicht');
    fView.add(params, 'wireframe').name('Wireframe').onChange(setWireframe);
    fView.add(params, 'showGrid').name('Grid').onChange(v => {
      grid.visible = v;
      ground.visible = v;
    });
    fView.add(params, 'autoRotateY').name('Auto Rotate Y');
    fView.open();

    gui.add(params, 'reset').name('Reset');

    const manager = new THREE.LoadingManager();

    manager.setURLModifier((url) => {
      const cleaned = decodeURIComponent(url).replace(/\\/g, '/');
      const filename = cleaned.split('/').pop();

      if (!filename) return url;

      const lower = filename.toLowerCase();
      const isTexture =
        lower.endsWith('.png') ||
        lower.endsWith('.jpg') ||
        lower.endsWith('.jpeg') ||
        lower.endsWith('.webp') ||
        lower.endsWith('.bmp') ||
        lower.endsWith('.tga') ||
        lower.endsWith('.tif') ||
        lower.endsWith('.tiff');

      if (isTexture) {
        return MODEL_DIR + filename;
      }

      return url;
    });

    manager.onProgress = (url, loaded, total) => {
      loadingEl.textContent = `Lade Assets ... ${loaded}/${total}`;
    };

    const loader = new FBXLoader(manager);
    loader.setPath(MODEL_DIR);
    loader.setResourcePath(MODEL_DIR);

    loader.load(
      MODEL_FILE,
      (fbx) => {
        model = fbx;

        model.traverse((child) => {
          if (!child.isMesh) return;

          child.castShadow = true;
          child.receiveShadow = true;

          const materials = Array.isArray(child.material)
            ? child.material
            : (child.material ? [child.material] : []);

          materials.forEach((mat) => {
            if (!mat) return;

            mat.side = THREE.DoubleSide;

            if (!originalMaps.has(mat)) {
              originalMaps.set(mat, mat.map || null);
            }

            const textureSlots = [
              'map',
              'aoMap',
              'alphaMap',
              'bumpMap',
              'normalMap',
              'specularMap',
              'emissiveMap',
              'metalnessMap',
              'roughnessMap'
            ];

            textureSlots.forEach((slot) => {
              if (mat[slot]) {
                if (
                  slot === 'map' ||
                  slot === 'emissiveMap' ||
                  slot === 'specularMap'
                ) {
                  mat[slot].colorSpace = THREE.SRGBColorSpace;
                }
                mat[slot].needsUpdate = true;
              }
            });

            mat.needsUpdate = true;
          });
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        model.position.sub(center);
        model.position.y += size.y * 0.5;

        scene.add(model);

        const maxDim = Math.max(size.x, size.y, size.z) || 200;
        const distance = maxDim * 1.8;

        camera.position.set(distance * 0.6, distance * 0.5, distance);
        camera.near = Math.max(0.1, maxDim / 1000);
        camera.far = Math.max(10000, maxDim * 30);
        camera.updateProjectionMatrix();

        controls.target.set(0, size.y * 0.35, 0);
        controls.update();

        playVideosBtn.disabled = false;
        loadingEl.textContent = 'Modell geladen';
        setTimeout(() => {
          loadingEl.style.display = 'none';
        }, 800);
      },
      (xhr) => {
        if (xhr.total) {
          const percent = (xhr.loaded / xhr.total) * 100;
          loadingEl.textContent = `Lade Modell ... ${percent.toFixed(0)}%`;
        }
      },
      () => {
        loadingEl.textContent = 'Fehler beim Laden des FBX oder der Texturen';
      }
    );

    function getBaseNameFromTexture(texture) {
      if (!texture || !texture.image) return null;

      let src = '';

      if (typeof texture.image.currentSrc === 'string' && texture.image.currentSrc) {
        src = texture.image.currentSrc;
      } else if (typeof texture.image.src === 'string' && texture.image.src) {
        src = texture.image.src;
      } else if (typeof texture.name === 'string' && texture.name) {
        src = texture.name;
      }

      if (!src) return null;

      const cleaned = decodeURIComponent(src).replace(/\\/g, '/');
      const filename = cleaned.split('/').pop() || '';
      const dotIndex = filename.lastIndexOf('.');
      if (dotIndex === -1) return filename;

      return filename.slice(0, dotIndex);
    }

    function createVideoTexture(videoUrl) {
      const video = document.createElement('video');
      video.src = videoUrl;
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      video.preload = 'auto';
      video.crossOrigin = 'anonymous';

      const videoTexture = new THREE.VideoTexture(video);
      videoTexture.colorSpace = THREE.SRGBColorSpace;
      videoTexture.minFilter = THREE.LinearFilter;
      videoTexture.magFilter = THREE.LinearFilter;
      videoTexture.generateMipmaps = false;

      return { video, videoTexture };
    }

    async function switchToVideos() {
      if (!model || isUsingVideos) return;

      playVideosBtn.disabled = true;
      restoreTexturesBtn.disabled = true;
      loadingEl.style.display = 'block';
      loadingEl.textContent = 'Starte Video-Texturen ...';

      const materialUpdates = [];

      model.traverse((child) => {
        if (!child.isMesh || !child.material) return;

        const materials = Array.isArray(child.material)
          ? child.material
          : [child.material];

        materials.forEach((mat) => {
          if (!mat) return;

          const originalMap = originalMaps.get(mat);
          const baseName = getBaseNameFromTexture(originalMap);

          if (!originalMap || !baseName) return;

          const videoUrl = MODEL_DIR + baseName + '.mp4';
          materialUpdates.push({ mat, videoUrl });
        });
      });

      try {
        for (const entry of materialUpdates) {
          const { mat, videoUrl } = entry;
          const { video, videoTexture } = createVideoTexture(videoUrl);

          await video.play();

          activeVideoEntries.push({ mat, video, videoTexture });

          mat.map = videoTexture;
          mat.needsUpdate = true;
        }

        isUsingVideos = true;
        playVideosBtn.disabled = true;
        restoreTexturesBtn.disabled = false;
        loadingEl.style.display = 'none';
      } catch (error) {
        stopAndDisposeVideos();
        restoreOriginalTextures();
        loadingEl.textContent = 'Video konnte nicht gestartet werden';
        playVideosBtn.disabled = false;
        restoreTexturesBtn.disabled = true;
      }
    }

    function restoreOriginalTextures() {
      if (!model) return;

      model.traverse((child) => {
        if (!child.isMesh || !child.material) return;

        const materials = Array.isArray(child.material)
          ? child.material
          : [child.material];

        materials.forEach((mat) => {
          if (!mat) return;
          mat.map = originalMaps.get(mat) || null;
          if (mat.map) {
            mat.map.needsUpdate = true;
          }
          mat.needsUpdate = true;
        });
      });
    }

    function stopAndDisposeVideos() {
      while (activeVideoEntries.length > 0) {
        const entry = activeVideoEntries.pop();

        try {
          entry.video.pause();
          entry.video.removeAttribute('src');
          entry.video.load();
        } catch (e) {}

        try {
          entry.videoTexture.dispose();
        } catch (e) {}
      }
    }

    function switchBackToTextures() {
      stopAndDisposeVideos();
      restoreOriginalTextures();
      isUsingVideos = false;
      playVideosBtn.disabled = false;
      restoreTexturesBtn.disabled = true;
    }

    playVideosBtn.addEventListener('click', switchToVideos);
    restoreTexturesBtn.addEventListener('click', switchBackToTextures);

    function applyTransforms() {
      if (!model) return;

      model.position.x = params.posX;
      model.position.y = params.posY;
      model.position.z = params.posZ;

      model.rotation.x = THREE.MathUtils.degToRad(params.rotX);
      model.rotation.y = THREE.MathUtils.degToRad(params.rotY);
      model.rotation.z = THREE.MathUtils.degToRad(params.rotZ);

      model.scale.setScalar(params.scale);
    }

    function setWireframe(enabled) {
      if (!model) return;

      model.traverse((child) => {
        if (!child.isMesh || !child.material) return;

        const materials = Array.isArray(child.material)
          ? child.material
          : [child.material];

        materials.forEach((mat) => {
          if ('wireframe' in mat) {
            mat.wireframe = enabled;
            mat.needsUpdate = true;
          }
        });
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      if (model && params.autoRotateY) {
        model.rotation.y += 0.01;
        params.rotY = THREE.MathUtils.radToDeg(model.rotation.y);
        if (params.rotY > 180) params.rotY -= 360;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
